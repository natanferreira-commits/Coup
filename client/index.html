<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>GOLPE</title>

    <!-- ── PWA ───────────────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d0d12" />

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GOLPE" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <!-- SEO / share -->
    <meta name="description" content="Jogo de cartas multiplayer brasileiro. Blefe, poder e traição." />
    <meta name="application-name" content="GOLPE" />

    <!-- ── Fonts ──────────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      (function(){var t=localStorage.getItem('golpe_theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
